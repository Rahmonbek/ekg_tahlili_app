# =============================================================
# NMED — Nginx konfiguratsiyasi
# Joylashishi: /etc/nginx/sites-available/nmed.conf
# Faollashtirish: sudo ln -s /etc/nginx/sites-available/nmed.conf /etc/nginx/sites-enabled/
# =============================================================

# WebSocket uchun Connection header ni to'g'ri o'rnatish:
#   Upgrade header bor bo'lsa  → Connection: upgrade  (WebSocket)
#   Upgrade header yo'q bo'lsa → Connection: close    (oddiy HTTP / SSE)
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

# HTTP → HTTPS yo'naltirish
server {
    listen 80;
    server_name nmed.uz www.nmed.uz api.nmed.uz;
    return 301 https://$host$request_uri;
}

# ─── Frontend: nmed.uz ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name nmed.uz www.nmed.uz;

    ssl_certificate     /etc/letsencrypt/live/nmed.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nmed.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/nmed/frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Backend API: api.nmed.uz ─────────────────────────────────
server {
    listen 443 ssl;
    server_name api.nmed.uz;

    ssl_certificate     /etc/letsencrypt/live/api.nmed.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nmed.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout 60s;

    # ── SignalR / WebSocket ────────────────────────────────────
    # /hubs/ — WebSocket upgrade + SSE buffering o'chirilgan
    location /hubs/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket upgrade (map orqali to'g'ri qiymat)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # MUHIM: SSE va WebSocket uchun buffering o'chirilishi shart
        # Aks holda handshake xabari kechikadi → "Handshake was canceled"
        proxy_buffering    off;
        proxy_cache        off;
        proxy_cache_bypass $http_upgrade;

        # Uzoq muddatli ulanishlar uchun timeout
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Oddiy API so'rovlar ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
