# =============================================================
# NMED — Nginx konfiguratsiyasi
# Joylashishi: /etc/nginx/sites-available/nmed.conf
# Faollashtirish: sudo ln -s /etc/nginx/sites-available/nmed.conf /etc/nginx/sites-enabled/
# =============================================================

# HTTP → HTTPS yo'naltirish
server {
    listen 80;
    server_name nmed.uz www.nmed.uz api.nmed.uz;
    return 301 https://$host$request_uri;
}

# ─── Frontend: nmed.uz ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name nmed.uz www.nmed.uz;

    # SSL sertifikatlari (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/nmed.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nmed.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # React build papkasi
    root /var/www/nmed/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Static fayllar — uzoq muddat cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA — barcha route'larni index.html ga yo'naltirish
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─── Backend API: api.nmed.uz ─────────────────────────────────
server {
    listen 443 ssl;
    server_name api.nmed.uz;

    ssl_certificate     /etc/letsencrypt/live/api.nmed.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nmed.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Fayl upload limiti (EKG, PDF, rasm fayllar uchun)
    client_max_body_size 50M;

    # Proxy timeout (AI tahlili uzoq ketishi mumkin)
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 60s;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
